name: Update TWSE official daily data

on:
  workflow_dispatch:
  schedule:
    # 15:40 Asia/Taipei, Monday to Friday after market close.
    - cron: '40 7 * * 1-5'
    # Retry at 17:10 Asia/Taipei when an upstream dataset is published late.
    - cron: '10 9 * * 1-5'

permissions:
  contents: write

concurrency:
  group: update-twse-official-daily-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch official TWSE market statistics and rankings
        run: npm run data:twse

      - name: Fetch official TWSE stock daily dataset
        run: npm run data:twse:stocks

      - name: Fetch official TWSE institutional dataset
        run: npm run data:twse:institutional

      - name: Generate stock snapshots
        run: npm run stock:snapshot:generate

      - name: Generate industry snapshot
        run: npm run industry:snapshot:generate

      - name: Generate market snapshot
        run: npm run snapshot:generate

      - name: Generate decisions
        run: npm run decision:generate

      - name: Run tests
        run: npm run test:run

      - name: Build application
        run: npm run build

      - name: Commit changed snapshot
        shell: bash
        run: |
          if git diff --quiet -- public/data/twse-market-overview.json public/data/twse-stocks public/data/twse-institutional public/data/stock-history public/data/history public/data/industry-history public/data/decisions; then
            echo "Market data and snapshots unchanged; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/twse-market-overview.json public/data/twse-stocks public/data/twse-institutional public/data/stock-history public/data/history public/data/industry-history public/data/decisions
          git commit -m "chore(data): update TWSE datasets, snapshots and decisions"
          git push origin HEAD:main
