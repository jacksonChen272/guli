name: Backfill TWSE stock history

on:
  workflow_dispatch:
    inputs:
      offset:
        description: Start offset in the TWSE common-stock universe
        required: true
        default: '0'
      batchSize:
        description: Number of symbols in this batch
        required: true
        default: '40'
      targetDays:
        description: Minimum actual trading days per symbol
        required: true
        default: '250'
      retryFailedOnly:
        description: Retry only symbols in the last checkpoint failed list
        type: boolean
        required: true
        default: false
      symbols:
        description: Optional comma-separated symbols (overrides universe batch)
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: stock-history-backfill
  cancel-in-progress: false

env:
  BACKFILL_BRANCH: automation/history-backfill

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Prepare history backfill branch
        shell: bash
        run: |
          git fetch origin main
          if git ls-remote --exit-code --heads origin "$BACKFILL_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BACKFILL_BRANCH:refs/remotes/origin/$BACKFILL_BRANCH"
            git checkout -B "$BACKFILL_BRANCH" "origin/$BACKFILL_BRANCH"
            git merge --no-edit -X ours origin/main
          else
            git checkout -b "$BACKFILL_BRANCH" origin/main
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backfill selected batch
        shell: bash
        env:
          OFFSET: ${{ inputs.offset }}
          BATCH_SIZE: ${{ inputs.batchSize }}
          TARGET_DAYS: ${{ inputs.targetDays }}
          RETRY_FAILED: ${{ inputs.retryFailedOnly }}
          SYMBOLS: ${{ inputs.symbols }}
        run: |
          ARGS=(--all --offset "$OFFSET" --batch-size "$BATCH_SIZE" --target-days "$TARGET_DAYS" --resume)
          if [[ "$RETRY_FAILED" == "true" ]]; then ARGS+=(--retry-failed-only); fi
          if [[ -n "$SYMBOLS" ]]; then ARGS+=(--symbols "$SYMBOLS"); fi
          npm run data:twse:history -- "${ARGS[@]}" 2>&1 | tee stock-history-backfill.log

      - name: Generate technical index
        run: npm run technical:index:generate

      - name: Generate screener results
        run: npm run screener:generate

      - name: Generate market heatmap
        run: npm run heatmap:generate

      - name: Validate generated datasets
        id: validate_backfill
        run: npm run data:validate

      - name: Run related tests
        id: test_backfill
        run: npm run test:run

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-history-backfill-${{ github.run_id }}
          path: stock-history-backfill.log
          if-no-files-found: warn

      - name: Commit allowed backfill datasets
        id: commit_backfill
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/twse-stock-history public/data/technical-index public/data/screener public/data/market-heatmap
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Backfill output unchanged; no commit or pull request update is required."
            exit 0
          fi
          git commit -m "chore(data): backfill GULI stock history batch ${{ inputs.offset }}"
          git push origin "HEAD:$BACKFILL_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update backfill pull request
        if: steps.commit_backfill.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HISTORY_DATE=$(jq -r '[.symbols[].lastTradeDate] | max // "尚未取得"' public/data/twse-stock-history/index.json)
          TECHNICAL_DATE=$(jq -r '.tradeDate // "尚未取得"' public/data/technical-index/latest.json)
          SCREENER_DATE=$(jq -r '.tradeDate // "尚未取得"' public/data/screener/latest.json)
          HEATMAP_DATE=$(jq -r '.tradeDate // "尚未取得"' public/data/market-heatmap/latest.json)
          PR_BODY=$(cat <<EOF
          ## GULI 歷史行情回補

          - 批次 offset：${{ inputs.offset }}
          - 批次大小：${{ inputs.batchSize }}
          - 歷史行情最新交易日：$HISTORY_DATE
          - Technical Index 日期：$TECHNICAL_DATE
          - Screener 日期：$SCREENER_DATE
          - Heatmap 日期：$HEATMAP_DATE
          - JSON 驗證結果：${{ steps.validate_backfill.outcome }}
          - 測試結果：${{ steps.test_backfill.outcome }}

          僅包含允許的歷史行情與衍生資料路徑，請人工審查後合併。
          EOF
          )

          if gh pr view "$BACKFILL_BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BACKFILL_BRANCH" --repo "$GITHUB_REPOSITORY" --title "chore(data): backfill GULI stock history" --body "$PR_BODY"
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$BACKFILL_BRANCH" --title "chore(data): backfill GULI stock history" --body "$PR_BODY"
          fi
